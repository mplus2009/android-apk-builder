name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    
    - name: Dar permisos a gradlew
      run: chmod +x gradlew
    
    - name: Verificar requisitos de la app
      run: |
        echo "📱 Verificando configuración de Android..."
        if [ ! -f "app/build.gradle" ] && [ ! -f "app/build.gradle.kts" ]; then
          echo "❌ No se encontró app/build.gradle"
          exit 1
        fi
        echo "✅ Archivos de proyecto encontrados"
        ./gradlew dependencies --dry-run || echo "⚠️ Advertencia: No se pudieron verificar dependencias"
    
    - name: Descargar dependencias
      run: |
        echo "📦 Descargando dependencias del proyecto..."
        ./gradlew build --no-daemon --parallel --dry-run
        ./gradlew resolveDependencies --no-daemon || echo "✅ Dependencias listas"
    
    - name: Compilar APK (Debug)
      run: |
        echo "🔨 Compilando APK en modo debug..."
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Compilar APK (Release)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🔨 Compilando APK en modo release..."
        ./gradlew assembleRelease --no-daemon --stacktrace
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
    
    - name: Verificar APKs generados
      run: |
        echo "🔍 Verificando APKs generados..."
        if [ -d "app/build/outputs/apk" ]; then
          echo "✅ APKs encontrados:"
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          find app/build/outputs/apk -name "*.apk" -exec file {} \;
        else
          echo "❌ No se encontraron APKs"
          exit 1
        fi
    
    - name: Subir APK Debug como artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Subir APK Release como artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Crear release con APK
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
