name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.6'
    
    - name: Dar permisos a gradlew
      run: chmod +x gradlew
    
    - name: Verificar archivos del proyecto
      run: |
        echo "📁 Estructura del proyecto:"
        ls -la
        echo ""
        echo "📄 Verificando archivos necesarios:"
        test -f settings.gradle && echo "✅ settings.gradle" || echo "❌ settings.gradle"
        test -f gradle/libs.versions.toml && echo "✅ libs.versions.toml" || echo "❌ libs.versions.toml"
        test -f app/build.gradle.kts && echo "✅ app/build.gradle.kts" || echo "❌ app/build.gradle.kts"
        test -f app/google-services.json && echo "✅ google-services.json" || echo "⚠️ google-services.json (no requerido para debug)"
    
    - name: Crear debug.keystore para firma
      run: |
        echo "🔑 Generando debug.keystore..."
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug, O=Android, C=US"
        mv debug.keystore ${{ github.workspace }}/
    
    - name: Limpiar y compilar
      run: |
        echo "🧹 Limpiando proyecto..."
        ./gradlew clean --no-daemon --stacktrace || echo "⚠️ Clean falló"
        
        echo "📦 Descargando dependencias..."
        ./gradlew build --no-daemon --parallel --stacktrace || echo "⚠️ Build parcial"
        
        echo "🔨 Compilando APK Debug..."
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Compilar APK Release
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🔨 Compilando APK Release..."
        ./gradlew assembleRelease --no-daemon --stacktrace
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
        STORE_PASSWORD: android
        KEY_PASSWORD: android
    
    - name: Verificar APKs generados
      run: |
        echo "🔍 Buscando APKs generados..."
        if [ -d "app/build/outputs/apk" ]; then
          echo "✅ APKs encontrados:"
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo ""
          echo "📊 Tamaño de los APKs:"
          find app/build/outputs/apk -name "*.apk" -exec du -h {} \;
        else
          echo "❌ No se encontraron APKs"
          echo "Contenido de app/build:"
          find app/build -type f -name "*.apk" || echo "No hay APKs"
          exit 1
        fi
    
    - name: Subir APK Debug
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Subir APK Release
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Crear Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
