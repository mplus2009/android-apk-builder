name: Android APK Build (Full)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools & Compose Dependencies
        run: |
          sdkmanager "build-tools;33.0.1" "platforms;android-33" \
            "extras;google;m2repository" "extras;android;m2repository"

      - name: Setup Gradle (Official)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Fix Gradle Wrapper
        run: |
          rm -rf gradle/wrapper gradlew gradlew.bat
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
